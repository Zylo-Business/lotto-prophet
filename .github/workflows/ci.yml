name: CI

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: server/package-lock.json

      - name: Install & Build (backend)
        run: |
          cd server
          npm ci
          npm run build

      - name: Install & Lint/Typecheck (web)
        run: |
          cd lotto-prophet
          npm ci
          npm run build --if-present

